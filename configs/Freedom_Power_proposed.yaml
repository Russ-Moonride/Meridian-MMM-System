#
# Changes from configs/Freedom_Power.yaml:
#   1. data_path updated → points to processed file with GQV columns joined in
#   2. GQV_Brand added to controls  — branded search demand index (Google Ads)
#   3. GQV_Generic added to controls — category-level energy/solar search demand index
#
# No changes to: channels, organic_channels, priors, mcmc, max_lag, knots
#
# Source: transform log at docs/eda/freedom_power_gsq_transform_log.md
