#       config-builder archetype table only.
#
# Review checklist at bottom of file before renaming to Freedom_Power.yaml.

# ── Identity ──────────────────────────────────────────────────────────────────
client_id: freedom_power

# ── Data paths ────────────────────────────────────────────────────────────────
# CHANGED: data_path now points to the processed file which has GQV_Brand and
# GQV_Generic joined in. The raw file (Freedom_MMM_data_Mar26.csv) is no longer
# the modeling input — the processed file is a superset of it with 2 new columns.
data_path: data/processed/Freedom_Power/Freedom_MMM_data_Mar26_gqv.csv   # ← was: data/raw/Freedom_Power/Freedom_MMM_data_Mar26.csv
gcs_data_path: gs://mmm-pipeline-results/clients/freedom/Freedom_MMM_data_Mar26_gqv.csv
output_path: outputs/Freedom_Power/
gcs_output_path: gs://mmm-pipeline-results/clients/freedom/runs/

# ── Data structure ────────────────────────────────────────────────────────────
date_column: date
geo_column: geo
kpi_column: Gross_Leads
kpi_type: non_revenue

# ── Media channels (paid) ─────────────────────────────────────────────────────
# Unchanged. GQV signals are NOT paid channels — they have no _Cost counterpart
# and no ROI prior is assigned. They enter as controls below.
channels:
  - Brand
  - Non_Brand
  - DVD
  - Retargeting
  - Prospecting

organic_channels: []

# ── Controls ──────────────────────────────────────────────────────────────────
# ADDED: GQV_Brand and GQV_Generic.
#
# GQV_Brand:   Indexed branded search volume for "Freedom Power" by name.
#              Source: Google Ads Search Query Volume report, BRAND label.
#              Represents brand awareness/recall captured through search behavior.
#              Scale: ~0.00006–0.00187 (raw indexed values, not scaled).
#              Moderate correlation with Brand_Cost (r ≈ 0.50–0.61 depending on geo)
#              — not a multicollinearity concern, but monitor brand coefficient
#              stability after first dev run.
#
# GQV_Generic: Indexed category-level energy/solar search volume (non-brand).
#              Source: Google Ads Search Query Volume report, GENERIC label.
#              Represents exogenous market demand — how actively each DMA is
#              searching for energy solutions in a given week, independent of
#              Freedom Power's own spend.
#              Scale: ~0.07–1.54 (raw indexed values).
#              Strongest predictor signal in Houston (r = 0.70 with Gross_Leads).
#
# Both variables enter as contemporaneous controls (no lag, no adstock).
# Meridian does not apply adstock decay to control variables — confirmed.
controls:
  - tax_credit_shift
  - storm_date
  - GQV_Brand    # ← new: branded search demand index by geo-week
  - GQV_Generic  # ← new: category-level energy/solar demand index by geo-week

# ── Geo / population ──────────────────────────────────────────────────────────
population_column: population
geos_to_drop: []

# ── Prior specification ───────────────────────────────────────────────────────
# Unchanged. GQV variables are controls and do not receive ROI priors.
prior_type: contribution
target_contribution: 0.65  # raised from 0.60 — prior now wired into contribution_m Beta per channel
prior_concentration: 50.0

# ── Model spec ────────────────────────────────────────────────────────────────
knots: auto
max_lag: 4
media_effects_dist: log_normal

# ── MCMC settings ─────────────────────────────────────────────────────────────
mcmc:
  dev:
    n_chains: 1
    n_adapt: 200
    n_burnin: 200
    n_keep: 200
  prod:
    n_chains: 4
    n_adapt: 500
    n_burnin: 500
    n_keep: 500

max_runtime_minutes: 45

